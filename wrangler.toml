name = "portfolio-api"
compatibility_date = "2026-03-29"
main = "worker.js"

# ── Variables publiques ─────────────────────────────────────
[vars]
R2_PUBLIC_URL = "https://assets.frantzimann.org"

# ── D1 Database ─────────────────────────────────────────────
[[d1_databases]]
binding      = "portfolio_db"
database_name = "portfolio-db"
database_id  = "8f3e5ce4-a70a-4db4-8275-f867e3d2b0ca"

# ── R2 Bucket ────────────────────────────────────────────────
[[r2_buckets]]
binding     = "R2"
bucket_name = "video-portfolio"

# ── Secrets (à définir via CLI, jamais en clair ici) ─────────
# wrangler secret put ADMIN_USERNAME
# wrangler secret put ADMIN_PASSWORD
# wrangler secret put ADMIN_SECRET
